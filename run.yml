name: Daily FAMS to Google Sheets Sync

on:
  schedule:
    # Runs every day at 02:30 UTC (8:00 AM IST)
    - cron: '30 2 * * *'
  workflow_dispatch: # Allows manual trigger anytime from GitHub UI

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl gspread playwright lxml
          playwright install chromium

      - name: Run Sync Script
        env:
          FAMS_USER: ${{ secrets.FAMS_USER }}
          FAMS_PASS: ${{ secrets.FAMS_PASS }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python main.py
